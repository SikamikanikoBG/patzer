name: Publish to Docker Hub

# Builds and pushes the runtime image to Docker Hub on every push to main, so
# the ardi deployment (which tracks `sikamikaniko123/patzer:latest` via
# Watchtower) auto-redeploys. Tag pushes still publish multi-arch to GHCR via
# release.yml — this workflow is the continuous "latest" channel.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Build + push (Docker Hub)
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/sikamikaniko123/patzer
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # ardi (the deployment target) is linux/amd64. Single-arch keeps the
          # every-push build fast; release.yml handles multi-arch on tags.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
