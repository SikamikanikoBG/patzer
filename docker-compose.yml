services:
  patzer:
    # Pulls the published image from Docker Hub by default (rebuilt on every
    # push to main by .github/workflows/docker-publish.yml). To build from
    # local source instead, uncomment `build: .` and run `docker compose build`.
    image: sikamikaniko123/patzer:latest
    # build: .
    container_name: patzer
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8800}:8800"
    volumes:
      - patzer-data:/app/data
    environment:
      - NODE_ENV=production
      # PORT/HOST/DB_PATH/STOCKFISH_PATH have sensible defaults baked into the image.
    labels:
      # Opt this container in to the (label-enabled) Watchtower on the host, so
      # a new `:latest` on Docker Hub is pulled and the container recreated
      # automatically. The named volume below keeps the SQLite DB across that.
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8800/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Without these caps the json-file driver grows logs unbounded on the host.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  patzer-data:
